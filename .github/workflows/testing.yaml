name: Tests
on:
  push:
    branches: [main, beta]
  pull_request:
    branches: [main, beta]

concurrency:
  group: testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run type check
        run: npm run type-check

  tests-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit

  # NOTE: Packaged Electron smoke coverage is enforced in the release workflow on
  # Windows/macOS runners. This workflow keeps PR/push validation limited to unit tests.
